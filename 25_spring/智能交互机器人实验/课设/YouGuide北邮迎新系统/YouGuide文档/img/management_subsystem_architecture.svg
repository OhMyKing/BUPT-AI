<svg viewBox="0 0 1400 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="frontendGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backendGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E1BEE7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE4B5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serviceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F3E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; }
    .subtitle { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
    .component { font-family: Arial, sans-serif; font-size: 14px; }
    .small { font-family: Arial, sans-serif; font-size: 12px; }
    .layer-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
    .code { font-family: 'Courier New', monospace; font-size: 11px; fill: #333; }
  </style>
  
  <!-- 标题 -->
  <text x="700" y="40" text-anchor="middle" class="title">YouGuide 管理子系统架构（基于RuoYi框架）</text>
  
  <!-- 前端层 -->
  <rect x="50" y="80" width="1300" height="200" fill="url(#frontendGrad)" stroke="#1976D2" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="100" y="110" class="layer-title">前端层 (Vue.js + Element UI)</text>
  
  <!-- 页面模块 -->
  <rect x="100" y="130" width="200" height="120" fill="#E1F5FE" stroke="#0277BD" stroke-width="1" rx="5"/>
  <text x="200" y="155" text-anchor="middle" class="component">机器人管理页面</text>
  <text x="200" y="175" text-anchor="middle" class="small">实时状态监控</text>
  <text x="200" y="190" text-anchor="middle" class="small">任务分配</text>
  <text x="200" y="205" text-anchor="middle" class="small">远程控制</text>
  <text x="200" y="220" text-anchor="middle" class="small">角色切换</text>
  <text x="200" y="235" text-anchor="middle" class="small">历史记录</text>
  
  <rect x="320" y="130" width="200" height="120" fill="#E1F5FE" stroke="#0277BD" stroke-width="1" rx="5"/>
  <text x="420" y="155" text-anchor="middle" class="component">新生管理页面</text>
  <text x="420" y="175" text-anchor="middle" class="small">信息录入</text>
  <text x="420" y="190" text-anchor="middle" class="small">进度跟踪</text>
  <text x="420" y="205" text-anchor="middle" class="small">人脸关联</text>
  <text x="420" y="220" text-anchor="middle" class="small">宿舍分配</text>
  <text x="420" y="235" text-anchor="middle" class="small">数据统计</text>
  
  <rect x="540" y="130" width="200" height="120" fill="#E1F5FE" stroke="#0277BD" stroke-width="1" rx="5"/>
  <text x="640" y="155" text-anchor="middle" class="component">志愿者管理页面</text>
  <text x="640" y="175" text-anchor="middle" class="small">人员调度</text>
  <text x="640" y="190" text-anchor="middle" class="small">位置跟踪</text>
  <text x="640" y="205" text-anchor="middle" class="small">任务分配</text>
  <text x="640" y="220" text-anchor="middle" class="small">工作统计</text>
  <text x="640" y="235" text-anchor="middle" class="small">绩效评估</text>
  
  <rect x="760" y="130" width="200" height="120" fill="#E1F5FE" stroke="#0277BD" stroke-width="1" rx="5"/>
  <text x="860" y="155" text-anchor="middle" class="component">实时地图监控</text>
  <text x="860" y="175" text-anchor="middle" class="small">机器人位置</text>
  <text x="860" y="190" text-anchor="middle" class="small">任务路径</text>
  <text x="860" y="205" text-anchor="middle" class="small">热力图分析</text>
  <text x="860" y="220" text-anchor="middle" class="small">WebSocket实时更新</text>
  <text x="860" y="235" text-anchor="middle" class="small">多机协同可视化</text>
  
  <rect x="980" y="130" width="180" height="120" fill="#E1F5FE" stroke="#0277BD" stroke-width="1" rx="5"/>
  <text x="1070" y="155" text-anchor="middle" class="component">系统管理页面</text>
  <text x="1070" y="175" text-anchor="middle" class="small">用户权限</text>
  <text x="1070" y="190" text-anchor="middle" class="small">角色管理</text>
  <text x="1070" y="205" text-anchor="middle" class="small">日志审计</text>
  <text x="1070" y="220" text-anchor="middle" class="small">参数配置</text>
  <text x="1070" y="235" text-anchor="middle" class="small">数据字典</text>
  
  <rect x="1180" y="130" width="150" height="120" fill="#E1F5FE" stroke="#0277BD" stroke-width="1" rx="5"/>
  <text x="1255" y="155" text-anchor="middle" class="component">数据大屏</text>
  <text x="1255" y="175" text-anchor="middle" class="small">迎新进度</text>
  <text x="1255" y="190" text-anchor="middle" class="small">服务统计</text>
  <text x="1255" y="205" text-anchor="middle" class="small">异常告警</text>
  <text x="1255" y="220" text-anchor="middle" class="small">效率分析</text>
  
  <!-- API网关层 -->
  <rect x="50" y="300" width="1300" height="100" fill="#F5F5F5" stroke="#616161" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="100" y="330" class="layer-title">API网关层</text>
  
  <rect x="200" y="340" width="300" height="40" fill="#FAFAFA" stroke="#424242" stroke-width="1" rx="5"/>
  <text x="350" y="365" text-anchor="middle" class="component">Spring Gateway</text>
  
  <rect x="550" y="340" width="300" height="40" fill="#FAFAFA" stroke="#424242" stroke-width="1" rx="5"/>
  <text x="700" y="365" text-anchor="middle" class="component">JWT认证 / 权限校验</text>
  
  <rect x="900" y="340" width="300" height="40" fill="#FAFAFA" stroke="#424242" stroke-width="1" rx="5"/>
  <text x="1050" y="365" text-anchor="middle" class="component">限流 / 负载均衡</text>
  
  <!-- 后端服务层 -->
  <rect x="50" y="420" width="1300" height="320" fill="url(#backendGrad)" stroke="#7B1FA2" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="100" y="450" class="layer-title">后端服务层 (Spring Boot)</text>
  
  <!-- Controller层 -->
  <rect x="100" y="470" width="1250" height="80" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1" rx="5" stroke-dasharray="5,5"/>
  <text x="120" y="495" class="component">Controller层</text>
  
  <rect x="130" y="500" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="240" y="525" text-anchor="middle" class="small">RobotsController</text>
  
  <rect x="370" y="500" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="480" y="525" text-anchor="middle" class="small">StudentsController</text>
  
  <rect x="610" y="500" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="720" y="525" text-anchor="middle" class="small">VolunteersController</text>
  
  <rect x="850" y="500" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="960" y="525" text-anchor="middle" class="small">TaskController</text>
  
  <rect x="1090" y="500" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="1200" y="510" text-anchor="middle" class="small">@PreAuthorize</text>
  <text x="1200" y="530" text-anchor="middle" class="small">RESTful API</text>
  
  <!-- Service层 -->
  <rect x="100" y="560" width="1250" height="80" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1" rx="5" stroke-dasharray="5,5"/>
  <text x="120" y="585" class="component">Service层</text>
  
  <rect x="130" y="590" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="240" y="615" text-anchor="middle" class="small">RobotsServiceImpl</text>
  
  <rect x="370" y="590" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="480" y="615" text-anchor="middle" class="small">StudentsServiceImpl</text>
  
  <rect x="610" y="590" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="720" y="615" text-anchor="middle" class="small">VolunteersServiceImpl</text>
  
  <rect x="850" y="590" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="960" y="615" text-anchor="middle" class="small">TaskScheduler</text>
  
  <rect x="1090" y="590" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="1200" y="600" text-anchor="middle" class="small">@Transactional</text>
  <text x="1200" y="620" text-anchor="middle" class="small">业务逻辑处理</text>
  
  <!-- Mapper层 -->
  <rect x="100" y="650" width="1250" height="80" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1" rx="5" stroke-dasharray="5,5"/>
  <text x="120" y="675" class="component">Mapper层 (MyBatis)</text>
  
  <rect x="130" y="680" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="240" y="705" text-anchor="middle" class="small">RobotsMapper</text>
  
  <rect x="370" y="680" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="480" y="705" text-anchor="middle" class="small">StudentsMapper</text>
  
  <rect x="610" y="680" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="720" y="705" text-anchor="middle" class="small">VolunteersMapper</text>
  
  <rect x="850" y="680" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="960" y="705" text-anchor="middle" class="small">KeyPositionsMapper</text>
  
  <rect x="1090" y="680" width="220" height="40" fill="#EDE7F6" stroke="#512DA8" stroke-width="1" rx="3"/>
  <text x="1200" y="690" text-anchor="middle" class="small">XML映射文件</text>
  <text x="1200" y="710" text-anchor="middle" class="small">动态SQL</text>
  
  <!-- 核心功能服务 -->
  <rect x="50" y="760" width="1300" height="140" fill="url(#serviceGrad)" stroke="#388E3C" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="100" y="790" class="layer-title">核心功能服务</text>
  
  <rect x="100" y="810" width="240" height="70" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" rx="5"/>
  <text x="220" y="835" text-anchor="middle" class="component">任务调度服务</text>
  <text x="220" y="855" text-anchor="middle" class="small">多机协同算法</text>
  <text x="220" y="870" text-anchor="middle" class="small">最近距离分配</text>
  
  <rect x="360" y="810" width="240" height="70" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" rx="5"/>
  <text x="480" y="835" text-anchor="middle" class="component">实时通信服务</text>
  <text x="480" y="855" text-anchor="middle" class="small">WebSocket</text>
  <text x="480" y="870" text-anchor="middle" class="small">位置推送</text>
  
  <rect x="620" y="810" width="240" height="70" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" rx="5"/>
  <text x="740" y="835" text-anchor="middle" class="component">远程控制服务</text>
  <text x="740" y="855" text-anchor="middle" class="small">指令下发</text>
  <text x="740" y="870" text-anchor="middle" class="small">状态同步</text>
  
  <rect x="880" y="810" width="220" height="70" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" rx="5"/>
  <text x="990" y="835" text-anchor="middle" class="component">数据分析服务</text>
  <text x="990" y="855" text-anchor="middle" class="small">效率统计</text>
  <text x="990" y="870" text-anchor="middle" class="small">异常检测</text>
  
  <rect x="1120" y="810" width="210" height="70" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" rx="5"/>
  <text x="1225" y="835" text-anchor="middle" class="component">缓存服务</text>
  <text x="1225" y="855" text-anchor="middle" class="small">Redis缓存</text>
  <text x="1225" y="870" text-anchor="middle" class="small">热点数据</text>
  
  <!-- 数据层 -->
  <rect x="50" y="920" width="1300" height="140" fill="url(#dataGrad)" stroke="#F57C00" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="100" y="950" class="layer-title">数据存储层</text>
  
  <!-- MySQL数据库 -->
  <rect x="100" y="970" width="600" height="70" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="5"/>
  <text x="400" y="995" text-anchor="middle" class="component">MySQL数据库</text>
  <text x="200" y="1015" text-anchor="start" class="small">robots | students | volunteers | key_positions</text>
  <text x="200" y="1030" text-anchor="start" class="small">sys_user | sys_role | sys_menu | sys_log</text>
  
  <!-- Redis缓存 -->
  <rect x="750" y="970" width="250" height="70" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="5"/>
  <text x="875" y="995" text-anchor="middle" class="component">Redis缓存</text>
  <text x="875" y="1015" text-anchor="middle" class="small">会话管理</text>
  <text x="875" y="1030" text-anchor="middle" class="small">实时数据</text>
  
  <!-- 日志存储 -->
  <rect x="1050" y="970" width="250" height="70" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="5"/>
  <text x="1175" y="995" text-anchor="middle" class="component">日志存储</text>
  <text x="1175" y="1015" text-anchor="middle" class="small">操作日志</text>
  <text x="1175" y="1030" text-anchor="middle" class="small">异常日志</text>
  
  <!-- 数据流箭头 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- 连接线 -->
  <line x1="700" y1="280" x2="700" y2="300" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="700" y1="400" x2="700" y2="420" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="700" y1="740" x2="700" y2="760" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="700" y1="900" x2="700" y2="920" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 特性标注 -->
  <rect x="50" y="1080" width="300" height="40" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1" rx="5"/>
  <text x="200" y="1105" text-anchor="middle" class="small" font-weight="bold">前后端分离 | RESTful API</text>
  
  <rect x="370" y="1080" width="300" height="40" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1" rx="5"/>
  <text x="520" y="1105" text-anchor="middle" class="small" font-weight="bold">RBAC权限 | JWT认证</text>
  
  <rect x="690" y="1080" width="300" height="40" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1" rx="5"/>
  <text x="840" y="1105" text-anchor="middle" class="small" font-weight="bold">分层架构 | 高度解耦</text>
  
  <rect x="1010" y="1080" width="340" height="40" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1" rx="5"/>
  <text x="1180" y="1105" text-anchor="middle" class="small" font-weight="bold">实时监控 | 数据驱动决策</text>
</svg>