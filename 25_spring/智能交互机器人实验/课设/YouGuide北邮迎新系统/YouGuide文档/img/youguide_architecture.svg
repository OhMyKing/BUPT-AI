<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D1E7F5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE4B5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="navGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F3E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mgmtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E1BEE7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE6E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFCDD2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <style>
    .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; }
    .subtitle { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
    .component { font-family: Arial, sans-serif; font-size: 14px; }
    .small { font-family: Arial, sans-serif; font-size: 12px; }
    .layer-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
  </style>
  
  <!-- 标题 -->
  <text x="700" y="40" text-anchor="middle" class="title">YouGuide 多机器人协同导航与智能交互系统架构</text>
  
  <!-- 用户层 -->
  <rect x="50" y="80" width="1300" height="120" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="700" y="110" text-anchor="middle" class="layer-title">用户层</text>
  
  <!-- 新生 -->
  <rect x="100" y="130" width="200" height="50" fill="#BBDEFB" stroke="#1565C0" stroke-width="1" rx="5"/>
  <text x="200" y="160" text-anchor="middle" class="component">新生</text>
  
  <!-- 志愿者 -->
  <rect x="350" y="130" width="200" height="50" fill="#BBDEFB" stroke="#1565C0" stroke-width="1" rx="5"/>
  <text x="450" y="160" text-anchor="middle" class="component">志愿者</text>
  
  <!-- 系统管理员 -->
  <rect x="600" y="130" width="200" height="50" fill="#BBDEFB" stroke="#1565C0" stroke-width="1" rx="5"/>
  <text x="700" y="160" text-anchor="middle" class="component">系统管理员</text>
  
  <!-- 微信企业号 -->
  <rect x="850" y="130" width="200" height="50" fill="#BBDEFB" stroke="#1565C0" stroke-width="1" rx="5"/>
  <text x="950" y="160" text-anchor="middle" class="component">微信企业号</text>
  
  <!-- Web管理界面 -->
  <rect x="1100" y="130" width="200" height="50" fill="#BBDEFB" stroke="#1565C0" stroke-width="1" rx="5"/>
  <text x="1200" y="160" text-anchor="middle" class="component">Web管理界面</text>
  
  <!-- 机器人层 -->
  <rect x="50" y="230" width="1300" height="140" fill="url(#robotGrad)" stroke="#0288D1" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="100" y="260" class="layer-title">机器人层</text>
  
  <!-- 引导机器人 -->
  <rect x="100" y="280" width="280" height="70" fill="#E1F5FE" stroke="#0277BD" stroke-width="1" rx="5"/>
  <text x="240" y="305" text-anchor="middle" class="component">引导机器人</text>
  <text x="240" y="325" text-anchor="middle" class="small">GPS导航 | 跟随引导 | 避障</text>
  <text x="240" y="340" text-anchor="middle" class="small">ROS + Flask服务</text>
  
  <!-- 答疑机器人 -->
  <rect x="430" y="280" width="280" height="70" fill="#E1F5FE" stroke="#0277BD" stroke-width="1" rx="5"/>
  <text x="570" y="305" text-anchor="middle" class="component">答疑机器人</text>
  <text x="570" y="325" text-anchor="middle" class="small">语音交互 | 人脸识别 | 多模态</text>
  <text x="570" y="340" text-anchor="middle" class="small">ROS + 流式ASR/TTS</text>
  
  <!-- 传感器模块 -->
  <rect x="760" y="280" width="250" height="70" fill="#E1F5FE" stroke="#0277BD" stroke-width="1" rx="5"/>
  <text x="885" y="305" text-anchor="middle" class="component">传感器模块</text>
  <text x="885" y="325" text-anchor="middle" class="small">摄像头 | 麦克风 | GPS</text>
  <text x="885" y="340" text-anchor="middle" class="small">深度相机 | 激光雷达</text>
  
  <!-- 动作执行模块 -->
  <rect x="1060" y="280" width="240" height="70" fill="#E1F5FE" stroke="#0277BD" stroke-width="1" rx="5"/>
  <text x="1180" y="305" text-anchor="middle" class="component">动作执行模块</text>
  <text x="1180" y="325" text-anchor="middle" class="small">举手 | 鞠躬 | 指引</text>
  <text x="1180" y="340" text-anchor="middle" class="small">异步非阻塞执行</text>
  
  <!-- 智能体层 -->
  <rect x="50" y="400" width="1300" height="140" fill="url(#agentGrad)" stroke="#F57C00" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="100" y="430" class="layer-title">智能体层 (Dify平台)</text>
  
  <!-- ReAct Agent -->
  <rect x="100" y="450" width="280" height="70" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="5"/>
  <text x="240" y="475" text-anchor="middle" class="component">ReAct Agent</text>
  <text x="240" y="495" text-anchor="middle" class="small">意图理解 | 任务规划</text>
  <text x="240" y="510" text-anchor="middle" class="small">工具调用编排</text>
  
  <!-- RAG系统 -->
  <rect x="430" y="450" width="280" height="70" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="5"/>
  <text x="570" y="475" text-anchor="middle" class="component">RAG系统</text>
  <text x="570" y="495" text-anchor="middle" class="small">迎新文档 | 流程知识</text>
  <text x="570" y="510" text-anchor="middle" class="small">语义检索 | 知识融合</text>
  
  <!-- 工具插件 -->
  <rect x="760" y="450" width="540" height="70" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="5"/>
  <text x="1030" y="475" text-anchor="middle" class="component">Dify工具插件</text>
  <text x="1030" y="495" text-anchor="middle" class="small">人脸识别工具 | 机器人动作工具 | 导航查询工具</text>
  <text x="1030" y="510" text-anchor="middle" class="small">学生信息查询 | 引导任务发布 | 流程进度管理</text>
  
  <!-- 导航层 -->
  <rect x="50" y="560" width="640" height="140" fill="url(#navGrad)" stroke="#388E3C" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="100" y="590" class="layer-title">导航子系统</text>
  
  <!-- 路径规划 -->
  <rect x="100" y="610" width="250" height="70" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" rx="5"/>
  <text x="225" y="635" text-anchor="middle" class="component">路径规划</text>
  <text x="225" y="655" text-anchor="middle" class="small">百度地图API</text>
  <text x="225" y="670" text-anchor="middle" class="small">步行路线优化</text>
  
  <!-- 实时导航 -->
  <rect x="390" y="610" width="250" height="70" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" rx="5"/>
  <text x="515" y="635" text-anchor="middle" class="component">实时导航</text>
  <text x="515" y="655" text-anchor="middle" class="small">GPS定位 | 局部避障</text>
  <text x="515" y="670" text-anchor="middle" class="small">自适应速度控制</text>
  
  <!-- 管理层 -->
  <rect x="710" y="560" width="640" height="140" fill="url(#mgmtGrad)" stroke="#7B1FA2" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="760" y="590" class="layer-title">管理子系统 (RuoYi框架)</text>
  
  <!-- 机器人管理 -->
  <rect x="760" y="610" width="180" height="70" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1" rx="5"/>
  <text x="850" y="635" text-anchor="middle" class="component">机器人管理</text>
  <text x="850" y="655" text-anchor="middle" class="small">状态监控</text>
  <text x="850" y="670" text-anchor="middle" class="small">任务调度</text>
  
  <!-- 新生管理 -->
  <rect x="960" y="610" width="180" height="70" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1" rx="5"/>
  <text x="1050" y="635" text-anchor="middle" class="component">新生管理</text>
  <text x="1050" y="655" text-anchor="middle" class="small">信息维护</text>
  <text x="1050" y="670" text-anchor="middle" class="small">进度跟踪</text>
  
  <!-- 志愿者管理 -->
  <rect x="1160" y="610" width="180" height="70" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1" rx="5"/>
  <text x="1250" y="635" text-anchor="middle" class="component">志愿者管理</text>
  <text x="1250" y="655" text-anchor="middle" class="small">人员调度</text>
  <text x="1250" y="670" text-anchor="middle" class="small">协同工作</text>
  
  <!-- 基础设施层 -->
  <rect x="50" y="720" width="640" height="140" fill="#F5F5F5" stroke="#616161" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="100" y="750" class="layer-title">基础设施层</text>
  
  <!-- 数据存储 -->
  <rect x="100" y="770" width="250" height="70" fill="#FAFAFA" stroke="#424242" stroke-width="1" rx="5"/>
  <text x="225" y="795" text-anchor="middle" class="component">数据存储</text>
  <text x="225" y="815" text-anchor="middle" class="small">MySQL | Redis</text>
  <text x="225" y="830" text-anchor="middle" class="small">知识库 | 日志</text>
  
  <!-- 通信协议 -->
  <rect x="390" y="770" width="250" height="70" fill="#FAFAFA" stroke="#424242" stroke-width="1" rx="5"/>
  <text x="515" y="795" text-anchor="middle" class="component">通信协议</text>
  <text x="515" y="815" text-anchor="middle" class="small">RESTful API</text>
  <text x="515" y="830" text-anchor="middle" class="small">WebSocket | ROS话题</text>
  
  <!-- API服务层 -->
  <rect x="710" y="720" width="640" height="140" fill="url(#apiGrad)" stroke="#D32F2F" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="760" y="750" class="layer-title">API服务层</text>
  
  <!-- AI服务 -->
  <rect x="760" y="770" width="280" height="70" fill="#FFEBEE" stroke="#C62828" stroke-width="1" rx="5"/>
  <text x="900" y="795" text-anchor="middle" class="component">AI服务集成</text>
  <text x="900" y="815" text-anchor="middle" class="small">vLLM大模型 | 百度人脸识别</text>
  <text x="900" y="830" text-anchor="middle" class="small">火山TTS | 字节ASR</text>
  
  <!-- 后端服务 -->
  <rect x="1060" y="770" width="280" height="70" fill="#FFEBEE" stroke="#C62828" stroke-width="1" rx="5"/>
  <text x="1200" y="795" text-anchor="middle" class="component">后端服务</text>
  <text x="1200" y="815" text-anchor="middle" class="small">Spring Boot | JWT认证</text>
  <text x="1200" y="830" text-anchor="middle" class="small">MyBatis | Spring Security</text>
  
  <!-- 连接线 -->
  <!-- 用户到机器人 -->
  <line x1="200" y1="180" x2="240" y2="280" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="450" y1="180" x2="570" y2="280" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 机器人到智能体 -->
  <line x1="240" y1="350" x2="240" y2="450" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="570" y1="350" x2="570" y2="450" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 智能体到导航和管理 -->
  <line x1="240" y1="520" x2="225" y2="610" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1030" y1="520" x2="1050" y2="610" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- 多机协同标注 -->
  <rect x="500" y="900" width="400" height="60" fill="#FFF9C4" stroke="#F9A825" stroke-width="2" rx="5" filter="url(#shadow)"/>
  <text x="700" y="925" text-anchor="middle" class="component" font-weight="bold">多机器人协同特性</text>
  <text x="700" y="945" text-anchor="middle" class="small">中心化调度 | 任务分配 | 虚实同步 | 角色切换</text>
</svg>