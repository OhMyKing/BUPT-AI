<svg viewBox="0 0 1400 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="cognitiveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE4B5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="executionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ragGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E1BEE7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE6E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFCDD2;stop-opacity:1" />
    </linearGradient>
    <pattern id="difyPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#FFF3E0"/>
      <text x="20" y="25" text-anchor="middle" font-size="10" fill="#F57C00" opacity="0.2">Dify</text>
    </pattern>
  </defs>
  
  <style>
    .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; }
    .subtitle { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
    .component { font-family: Arial, sans-serif; font-size: 14px; }
    .small { font-family: Arial, sans-serif; font-size: 12px; }
    .layer-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
    .process { font-family: Arial, sans-serif; font-size: 13px; font-style: italic; }
  </style>
  
  <!-- 标题 -->
  <text x="700" y="40" text-anchor="middle" class="title">YouGuide 智能体子系统架构 (基于Dify平台)</text>
  
  <!-- Dify平台容器 -->
  <rect x="30" y="70" width="1340" height="1000" fill="url(#difyPattern)" stroke="#F57C00" stroke-width="3" rx="15" filter="url(#shadow)"/>
  <text x="60" y="100" class="subtitle" fill="#E65100">Dify Platform</text>
  
  <!-- 输入层 -->
  <rect x="60" y="120" width="1280" height="100" fill="#FFF8E1" stroke="#FFA000" stroke-width="2" rx="10"/>
  <text x="700" y="150" text-anchor="middle" class="layer-title">输入接口层</text>
  
  <!-- 语音输入 -->
  <rect x="100" y="160" width="200" height="40" fill="#FFE082" stroke="#F57F17" stroke-width="1" rx="5"/>
  <text x="200" y="185" text-anchor="middle" class="component">语音输入(ASR)</text>
  
  <!-- 图像输入 -->
  <rect x="350" y="160" width="200" height="40" fill="#FFE082" stroke="#F57F17" stroke-width="1" rx="5"/>
  <text x="450" y="185" text-anchor="middle" class="component">图像输入(人脸)</text>
  
  <!-- 文本输入 -->
  <rect x="600" y="160" width="200" height="40" fill="#FFE082" stroke="#F57F17" stroke-width="1" rx="5"/>
  <text x="700" y="185" text-anchor="middle" class="component">文本输入</text>
  
  <!-- 传感器数据 -->
  <rect x="850" y="160" width="200" height="40" fill="#FFE082" stroke="#F57F17" stroke-width="1" rx="5"/>
  <text x="950" y="185" text-anchor="middle" class="component">传感器数据</text>
  
  <!-- 上下文信息 -->
  <rect x="1100" y="160" width="200" height="40" fill="#FFE082" stroke="#F57F17" stroke-width="1" rx="5"/>
  <text x="1200" y="185" text-anchor="middle" class="component">上下文信息</text>
  
  <!-- 认知层 -->
  <rect x="60" y="250" width="620" height="200" fill="url(#cognitiveGrad)" stroke="#1976D2" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="90" y="280" class="layer-title">认知层 (Understanding)</text>
  
  <!-- LLM推理 -->
  <rect x="90" y="310" width="260" height="120" fill="#E3F2FD" stroke="#0D47A1" stroke-width="1" rx="5"/>
  <text x="220" y="335" text-anchor="middle" class="component">LLM推理引擎</text>
  <text x="220" y="355" text-anchor="middle" class="small">• 意图识别</text>
  <text x="220" y="375" text-anchor="middle" class="small">• 实体抽取</text>
  <text x="220" y="395" text-anchor="middle" class="small">• 情感分析</text>
  <text x="220" y="415" text-anchor="middle" class="small">• 上下文理解</text>
  
  <!-- 多模态理解 -->
  <rect x="380" y="310" width="260" height="120" fill="#E3F2FD" stroke="#0D47A1" stroke-width="1" rx="5"/>
  <text x="510" y="335" text-anchor="middle" class="component">多模态理解</text>
  <text x="510" y="355" text-anchor="middle" class="small">• 图文联合理解</text>
  <text x="510" y="375" text-anchor="middle" class="small">• 场景识别</text>
  <text x="510" y="395" text-anchor="middle" class="small">• 身份验证</text>
  <text x="510" y="415" text-anchor="middle" class="small">• 环境感知</text>
  
  <!-- RAG系统 -->
  <rect x="720" y="250" width="620" height="200" fill="url(#ragGrad)" stroke="#7B1FA2" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="750" y="280" class="layer-title">RAG系统 (Knowledge Base)</text>
  
  <!-- 知识库 -->
  <rect x="750" y="310" width="180" height="120" fill="#F3E5F5" stroke="#4A148C" stroke-width="1" rx="5"/>
  <text x="840" y="335" text-anchor="middle" class="component">知识库</text>
  <text x="840" y="355" text-anchor="middle" class="small">• 迎新文档</text>
  <text x="840" y="375" text-anchor="middle" class="small">• 流程规则</text>
  <text x="840" y="395" text-anchor="middle" class="small">• 校园信息</text>
  <text x="840" y="415" text-anchor="middle" class="small">• 常见问题</text>
  
  <!-- 向量数据库 -->
  <rect x="950" y="310" width="180" height="120" fill="#F3E5F5" stroke="#4A148C" stroke-width="1" rx="5"/>
  <text x="1040" y="335" text-anchor="middle" class="component">向量数据库</text>
  <text x="1040" y="355" text-anchor="middle" class="small">• 语义索引</text>
  <text x="1040" y="375" text-anchor="middle" class="small">• 相似度匹配</text>
  <text x="1040" y="395" text-anchor="middle" class="small">• 实时更新</text>
  <text x="1040" y="415" text-anchor="middle" class="small">• 分片存储</text>
  
  <!-- 检索策略 -->
  <rect x="1150" y="310" width="170" height="120" fill="#F3E5F5" stroke="#4A148C" stroke-width="1" rx="5"/>
  <text x="1235" y="335" text-anchor="middle" class="component">检索策略</text>
  <text x="1235" y="355" text-anchor="middle" class="small">• 混合检索</text>
  <text x="1235" y="375" text-anchor="middle" class="small">• 关键词增强</text>
  <text x="1235" y="395" text-anchor="middle" class="small">• 上下文感知</text>
  <text x="1235" y="415" text-anchor="middle" class="small">• 冲突检测</text>
  
  <!-- 决策层 -->
  <rect x="60" y="480" width="1280" height="220" fill="url(#decisionGrad)" stroke="#F57C00" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="90" y="510" class="layer-title">决策层 (ReAct Framework)</text>
  
  <!-- ReAct循环 -->
  <g transform="translate(200, 540)">
    <!-- Reasoning -->
    <rect x="0" y="0" width="200" height="120" fill="#FFF3E0" stroke="#E65100" stroke-width="2" rx="10"/>
    <text x="100" y="30" text-anchor="middle" class="component" font-weight="bold">Reasoning</text>
    <text x="100" y="50" text-anchor="middle" class="small">推理</text>
    <text x="100" y="70" text-anchor="middle" class="small">• 分析当前状况</text>
    <text x="100" y="90" text-anchor="middle" class="small">• 确定目标</text>
    <text x="100" y="110" text-anchor="middle" class="small">• 选择策略</text>
    
    <!-- Acting -->
    <rect x="300" y="0" width="200" height="120" fill="#FFF3E0" stroke="#E65100" stroke-width="2" rx="10"/>
    <text x="400" y="30" text-anchor="middle" class="component" font-weight="bold">Acting</text>
    <text x="400" y="50" text-anchor="middle" class="small">行动</text>
    <text x="400" y="70" text-anchor="middle" class="small">• 选择工具</text>
    <text x="400" y="90" text-anchor="middle" class="small">• 构建参数</text>
    <text x="400" y="110" text-anchor="middle" class="small">• 执行调用</text>
    
    <!-- Observation -->
    <rect x="600" y="0" width="200" height="120" fill="#FFF3E0" stroke="#E65100" stroke-width="2" rx="10"/>
    <text x="700" y="30" text-anchor="middle" class="component" font-weight="bold">Observation</text>
    <text x="700" y="50" text-anchor="middle" class="small">观察</text>
    <text x="700" y="70" text-anchor="middle" class="small">• 收集结果</text>
    <text x="700" y="90" text-anchor="middle" class="small">• 评估效果</text>
    <text x="700" y="110" text-anchor="middle" class="small">• 更新状态</text>
    
    <!-- 循环箭头 -->
    <path d="M 200 60 L 300 60" stroke="#E65100" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
    <path d="M 500 60 L 600 60" stroke="#E65100" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
    <path d="M 700 120 Q 700 140 680 140 L 120 140 Q 100 140 100 120" stroke="#E65100" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
  </g>
  
  <!-- 决策示例 -->
  <rect x="1050" y="540" width="260" height="120" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="5"/>
  <text x="1180" y="565" text-anchor="middle" class="component">决策示例</text>
  <text x="1180" y="585" text-anchor="middle" class="small">新生："我刚到，该做什么？"</text>
  <text x="1180" y="605" text-anchor="middle" class="small">1. 推理：需要身份验证</text>
  <text x="1180" y="625" text-anchor="middle" class="small">2. 行动：调用人脸识别</text>
  <text x="1180" y="645" text-anchor="middle" class="small">3. 观察：获得学生信息</text>
  
  <!-- 执行层 -->
  <rect x="60" y="730" width="1280" height="180" fill="url(#executionGrad)" stroke="#388E3C" stroke-width="2" rx="10" filter="url(#shadow)"/>
  <text x="90" y="760" class="layer-title">执行层 (Tool Execution)</text>
  
  <!-- 工具1：人脸识别 -->
  <rect x="100" y="780" width="220" height="100" fill="#E8F5E9" stroke="#1B5E20" stroke-width="1" rx="5"/>
  <text x="210" y="805" text-anchor="middle" class="component">人脸识别工具</text>
  <text x="210" y="825" text-anchor="middle" class="small">• 身份验证</text>
  <text x="210" y="845" text-anchor="middle" class="small">• 信息查询</text>
  <text x="210" y="865" text-anchor="middle" class="small">• 进度获取</text>
  
  <!-- 工具2：机器人动作 -->
  <rect x="350" y="780" width="220" height="100" fill="#E8F5E9" stroke="#1B5E20" stroke-width="1" rx="5"/>
  <text x="460" y="805" text-anchor="middle" class="component">机器人动作工具</text>
  <text x="460" y="825" text-anchor="middle" class="small">• 举手/鞠躬</text>
  <text x="460" y="845" text-anchor="middle" class="small">• 指引方向</text>
  <text x="460" y="865" text-anchor="middle" class="small">• 表情动作</text>
  
  <!-- 工具3：导航查询 -->
  <rect x="600" y="780" width="220" height="100" fill="#E8F5E9" stroke="#1B5E20" stroke-width="1" rx="5"/>
  <text x="710" y="805" text-anchor="middle" class="component">导航查询工具</text>
  <text x="710" y="825" text-anchor="middle" class="small">• 路径规划</text>
  <text x="710" y="845" text-anchor="middle" class="small">• 位置查询</text>
  <text x="710" y="865" text-anchor="middle" class="small">• 距离计算</text>
  
  <!-- 工具4：任务发布 -->
  <rect x="850" y="780" width="220" height="100" fill="#E8F5E9" stroke="#1B5E20" stroke-width="1" rx="5"/>
  <text x="960" y="805" text-anchor="middle" class="component">引导任务发布</text>
  <text x="960" y="825" text-anchor="middle" class="small">• 分配机器人</text>
  <text x="960" y="845" text-anchor="middle" class="small">• 任务调度</text>
  <text x="960" y="865" text-anchor="middle" class="small">• 状态同步</text>
  
  <!-- 工具5：信息查询 -->
  <rect x="1100" y="780" width="220" height="100" fill="#E8F5E9" stroke="#1B5E20" stroke-width="1" rx="5"/>
  <text x="1210" y="805" text-anchor="middle" class="component">学生信息查询</text>
  <text x="1210" y="825" text-anchor="middle" class="small">• 个人信息</text>
  <text x="1210" y="845" text-anchor="middle" class="small">• 报到进度</text>
  <text x="1210" y="865" text-anchor="middle" class="small">• 流程推荐</text>
  
  <!-- 输出层 -->
  <rect x="60" y="940" width="1280" height="100" fill="#FCE4EC" stroke="#C2185B" stroke-width="2" rx="10"/>
  <text x="700" y="970" text-anchor="middle" class="layer-title">输出接口层</text>
  
  <!-- 语音输出 -->
  <rect x="200" y="980" width="200" height="40" fill="#F8BBD0" stroke="#880E4F" stroke-width="1" rx="5"/>
  <text x="300" y="1005" text-anchor="middle" class="component">语音合成(TTS)</text>
  
  <!-- 动作输出 -->
  <rect x="450" y="980" width="200" height="40" fill="#F8BBD0" stroke="#880E4F" stroke-width="1" rx="5"/>
  <text x="550" y="1005" text-anchor="middle" class="component">动作执行</text>
  
  <!-- 导航输出 -->
  <rect x="700" y="980" width="200" height="40" fill="#F8BBD0" stroke="#880E4F" stroke-width="1" rx="5"/>
  <text x="800" y="1005" text-anchor="middle" class="component">导航指令</text>
  
  <!-- 显示输出 -->
  <rect x="950" y="980" width="200" height="40" fill="#F8BBD0" stroke="#880E4F" stroke-width="1" rx="5"/>
  <text x="1050" y="1005" text-anchor="middle" class="component">界面显示</text>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- 数据流向 -->
  <path d="M 700 220 L 700 250" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
  <path d="M 370 450 L 370 480" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
  <path d="M 1030 450 L 1030 480" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
  <path d="M 700 700 L 700 730" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
  <path d="M 700 910 L 700 940" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
  
  <!-- 流式处理标注 -->
  <rect x="50" y="1055" width="300" height="35" fill="#E1F5FE" stroke="#0277BD" stroke-width="1" rx="5"/>
  <text x="200" y="1077" text-anchor="middle" class="small" font-weight="bold">流式处理：LLM输出→分句→TTS队列</text>
  
  <!-- 工具规范标注 -->
  <rect x="380" y="1055" width="300" height="35" fill="#FFF3E0" stroke="#E65100" stroke-width="1" rx="5"/>
  <text x="530" y="1077" text-anchor="middle" class="small" font-weight="bold">统一接口：流式输出|错误处理|变量传递</text>
  
  <!-- 知识融合标注 -->
  <rect x="710" y="1055" width="300" height="35" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1" rx="5"/>
  <text x="860" y="1077" text-anchor="middle" class="small" font-weight="bold">知识融合：相关性过滤|冲突检测|结构化整合</text>
  
  <!-- 迎新场景标注 -->
  <rect x="1040" y="1055" width="300" height="35" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" rx="5"/>
  <text x="1190" y="1077" text-anchor="middle" class="small" font-weight="bold">21K字迎新文档|13篇知识库|实时更新</text>
</svg>