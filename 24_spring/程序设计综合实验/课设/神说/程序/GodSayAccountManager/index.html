<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .container h2 {
            margin-bottom: 20px;
        }
        .container input {
            width: 95%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .container button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .container button:hover {
            background-color: #218838;
        }
        .toggle-link {
            cursor: pointer;
            color: #007bff;
            text-decoration: underline;
        }
        .toggle-link:hover {
            color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container" id="login-container">
    <h2>GodSay 登录</h2>
    <input type="text" id="login-username" placeholder="用户名" required>
    <input type="password" id="login-password" placeholder="密码" required>
    <button onclick="login()">登录游戏</button>
    <p id="login-error-message" style="color: red;"></p>
    <p>我还没有账户... <span class="toggle-link" onclick="toggleForm('register')">点击这里注册</span></p>
</div>

<div class="container" id="register-container" style="display: none;">
    <h2>GodSay 注册</h2>
    <input type="text" id="register-username" placeholder="用户名" required>
    <input type="password" id="register-password" placeholder="密码" required>
    <input type="email" id="register-email" placeholder="邮箱" required>
    <button onclick="register()">注册</button>
    <p id="register-error-message" style="color: red;"></p>
    <p>已经有账户了? <span class="toggle-link" onclick="toggleForm('login')">点击这里登录</span></p>
</div>

<script>
    function toggleForm(form) {
        const loginContainer = document.getElementById('login-container');
        const registerContainer = document.getElementById('register-container');

        if (form === 'login') {
            loginContainer.style.display = 'block';
            registerContainer.style.display = 'none';
        } else {
            loginContainer.style.display = 'none';
            registerContainer.style.display = 'block';
        }
    }

    function login() {
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    const errorMessage = document.getElementById('login-error-message');

    fetch('http://localhost:5000/login', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username: username, password: password })
    })
    .then(response => {
        if (response.redirected) {
            window.location.href = response.url;
        } else {
            return response.json();
        }
    })
    .then(data => {
        if (data && data.error) {
            errorMessage.textContent = data.error;
        } else if (data && data.redirect) {
            window.location.href = data.redirect;
        } else {
            errorMessage.textContent = '';
        }
    })
    .catch(error => {
        errorMessage.textContent = 'An error occurred. Please try again later.';
        console.error('Error:', error);
    });
}

    function register() {
        const username = document.getElementById('register-username').value;
        const password = document.getElementById('register-password').value;
        const email = document.getElementById('register-email').value;
        const errorMessage = document.getElementById('register-error-message');

        fetch('http://localhost:5000/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username: username, password: password, email: email })
        })
        .then(response => {
            if (response.redirected) {
                window.location.href = response.url;
            } else {
                return response.json();
            }
        })
        .then(data => {
            if (data && data.error) {
                errorMessage.textContent = data.error;
            } else if (data && data.redirect) {
                window.location.href = data.redirect;
            } else {
                errorMessage.textContent = '';
            }
        })
        .catch(error => {
            errorMessage.textContent = 'An error occurred. Please try again later.';
            console.error('Error:', error);
        });
    }
</script>

</body>
</html>
